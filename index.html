<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Riflan Mohamed — Software Engineer & AI Developer. Full-stack engineering, machine learning, and real-time systems." />
    <title>Riflan Mohamed — Software Engineer & AI Developer</title>
    <!-- Preconnect to the icon CDNs so the tech-marquee logos start loading
         sooner (DNS + TLS handshake happens in parallel with the JS). -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://cdn.simpleicons.org" crossorigin />
    <script>
      // Apply the saved/preferred theme before first paint to avoid a flash.
      // Default is dark; an explicit saved choice or the OS preference wins.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : prefersLight ? 'light' : 'dark';
          var root = document.documentElement;
          if (theme === 'dark') root.classList.add('dark');
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
